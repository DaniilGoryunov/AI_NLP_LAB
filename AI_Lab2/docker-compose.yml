version: "3.9"

services:
  spam-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spam-llm-service
    ports:
      - "8000:8000"   
      - "11434:11434" 
    volumes:
      - ollama_models:/root/.ollama 
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s 

volumes:
  ollama_models:
